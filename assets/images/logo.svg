<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <title>Blue Horizon</title>
  <desc>A blue sky above two soft-white mountain peaks within a graphite-outlined square. The left mountain (in front) rises from the left wall; its right slope overlays the right mountain partway past the valley before terminating.</desc>

  <!-- Clip all interior artwork to the square so the right mountain's acute corner miter cannot overshoot the frame. -->
  <defs>
    <clipPath id="frame">
      <rect x="48" y="48" width="416" height="416"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- Sky -->
    <rect x="48" y="48" width="416" height="416" fill="#0961BC"/>

    <!-- Right mountain (back) - full triangle with 1:1 slopes -->
    <polygon
      points="236,464 464,464 350,350"
      fill="#E3EEFB"
      stroke="#2A3240"
      stroke-width="6"
      stroke-linejoin="miter"
      stroke-miterlimit="10"/>

    <!-- Left mountain fill (front, no stroke). Quadrilateral extending down to the ground. -->
    <polygon
      points="48,370 150,268 346,464 48,464"
      fill="#E3EEFB"
      stroke="none"/>

    <!-- Left mountain visible stroke. Polyline terminates at (319, 437) partway down the right mountain. -->
    <polyline
      points="48,370 150,268 319,437"
      fill="none"
      stroke="#2A3240"
      stroke-width="6"
      stroke-linejoin="miter"
      stroke-linecap="round"
      stroke-miterlimit="10"/>
  </g>

  <!-- Square border, drawn last -->
  <rect
    x="48" y="48" width="416" height="416"
    fill="none"
    stroke="#2A3240"
    stroke-width="6"
    stroke-linejoin="miter"/>
</svg>
